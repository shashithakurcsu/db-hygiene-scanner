name: PR Hygiene Scan

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '**.cs'
      - '**.java'
      - '**.py'
      - '**.sql'
      - '**.xml'

concurrency:
  group: pr-scan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-scan:
    name: Scan PR for DB Hygiene Issues
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/main...HEAD -- '*.cs' '*.java' '*.py' '*.sql' '*.xml' | tr '\n' ',' | sed 's/,$//')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Changed files: $FILES"

      - name: Run fast scan
        id: scan
        if: steps.changed.outputs.files != ''
        run: |
          python -m db_hygiene_scanner.cli scan . \
            --fast \
            --format json \
            --output-file /tmp/pr-scan.json

          VIOLATIONS=$(python -c "import json; d=json.load(open('/tmp/pr-scan.json')); print(len(d.get('violations', [])))")
          echo "violations_count=$VIOLATIONS" >> "$GITHUB_OUTPUT"

      - name: Post PR comment with results
        if: steps.scan.outputs.violations_count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('/tmp/pr-scan.json', 'utf8'));
            const violations = data.violations || [];

            let body = '## DB Hygiene Scan Results\n\n';
            body += `**${violations.length} violation(s) detected**\n\n`;
            body += '| File | Line | Type | Severity |\n';
            body += '|------|------|------|----------|\n';

            for (const v of violations.slice(0, 20)) {
              body += `| ${v.file_path} | ${v.line_number} | ${v.violation_type} | ${v.severity} |\n`;
            }

            if (violations.length > 20) {
              body += `\n*...and ${violations.length - 20} more*\n`;
            }

            body += '\n---\n*Generated by db-hygiene-scanner*';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Add violation label
        if: steps.scan.outputs.violations_count > 0
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['db-hygiene-violations']
            });

      - name: Post clean result
        if: steps.scan.outputs.violations_count == 0 || steps.scan.outputs.violations_count == ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## DB Hygiene Scan Results\n\nNo database hygiene violations detected. :white_check_mark:\n\n---\n*Generated by db-hygiene-scanner*'
            });
