name: DB Hygiene Scan

on:
  schedule:
    # Weekly scan: Monday 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      repo_path:
        description: 'Path to target repository to scan'
        required: true
        default: '.'
        type: string
      scan_only:
        description: 'Scan only (no auto-fix)'
        required: false
        default: true
        type: boolean
      create_pr:
        description: 'Create PR if fixes generated'
        required: false
        default: false
        type: boolean

concurrency:
  group: db-hygiene-scan-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  scan-and-fix:
    name: Database Hygiene Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run scanner
        id: scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          REPO_PATH="${{ github.event.inputs.repo_path || '.' }}"
          python -m db_hygiene_scanner.cli scan "$REPO_PATH" \
            --format json \
            --output-file /tmp/scan-report.json

          # Parse violations count
          VIOLATIONS=$(python -c "import json; d=json.load(open('/tmp/scan-report.json')); print(len(d.get('violations', [])))")
          echo "violations_count=$VIOLATIONS" >> "$GITHUB_OUTPUT"
          echo "Detected $VIOLATIONS violations"

      - name: Generate fixes
        id: fix
        if: steps.scan.outputs.violations_count > 0 && github.event.inputs.scan_only != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m db_hygiene_scanner.cli fix . \
            --input /tmp/scan-report.json \
            --output-file /tmp/fixes.json
          echo "fixes_generated=true" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.fix.outputs.fixes_generated == 'true' && github.event.inputs.create_pr == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REVIEWER: ${{ secrets.GITHUB_REVIEWER }}
        run: |
          python -c "
          from db_hygiene_scanner.github_integration import GitHubIntegration
          gi = GitHubIntegration(
              repo_owner='${{ github.repository_owner }}',
              repo_name='${{ github.event.repository.name }}',
              github_token='${{ secrets.GITHUB_TOKEN }}',
              config_path='.db-hygiene.yml',
          )
          print('PR creation would happen here')
          "

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-report
          path: /tmp/scan-report.json
          retention-days: 30

      - name: Post summary annotation
        if: always()
        run: |
          VIOLATIONS="${{ steps.scan.outputs.violations_count }}"
          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "::warning::DB Hygiene Scan found $VIOLATIONS violations"
          else
            echo "::notice::DB Hygiene Scan passed with no violations"
          fi
